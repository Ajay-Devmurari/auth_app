<div
  class="min-h-screen flex items-center justify-center bg-linear-to-br from-indigo-600 via-purple-600 to-pink-600 px-4"
>
  <div
    class="w-full max-w-md backdrop-blur-xl bg-white/20 border border-white/30 rounded-2xl shadow-2xl p-8 transition-transform duration-300 hover:scale-[1.01]"
  >
    <!-- Header -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white">Create Account</h2>
      <p class="text-white/80 text-sm mt-2">Join us and start your journey 🚀</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Username -->
      <div class="relative">
        <input
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          required
          class="peer w-full px-4 py-3 bg-transparent border border-white/40 rounded-lg text-white placeholder-transparent focus:outline-none focus:border-white focus:ring-2 focus:ring-white/30 transition"
          placeholder="username"
        />

        <label
          for="username"
          class="absolute left-3 px-1 top-3 text-white/70 text-sm transition-all peer-placeholder-shown:top-3 peer-placeholder-shown:text-base peer-focus:-top-2 peer-focus:text-sm peer-focus:text-white"
        >
          Username
        </label>
      </div>

      <!-- Password -->
      <div class="relative">
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          class="peer w-full px-4 py-3 bg-transparent border border-white/40 rounded-lg text-white placeholder-transparent focus:outline-none focus:border-white focus:ring-2 focus:ring-white/30 transition"
          placeholder="Password"
        />

        <label
          for="password"
          class="absolute left-3 px-1 top-3 text-white/70 text-sm transition-all peer-placeholder-shown:top-3 peer-placeholder-shown:text-base peer-focus:-top-2 peer-focus:text-sm peer-focus:text-white"
        >
          Password
        </label>
      </div>

      <!-- Button -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full py-3 rounded-lg font-semibold text-white bg-linear-to-r from-indigo-500 to-pink-500 hover:scale-[1.02] transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed"
      >
        @if (!isLoading) {
          <span>Create account</span>
        } @else {
          <span class="flex items-center justify-center gap-2">
            <span
              class="h-4 w-4 border-2 border-white/60 border-t-transparent rounded-full animate-spin"
            ></span>
            Creating account...
          </span>
        }
      </button>
    </form>

    <!-- Footer -->
    <p class="text-center text-white/80 text-sm mt-6">
      Already have an account?
      <a
        routerLink="/login"
        (click)="gotoLogin()"
        class="text-white font-semibold hover:underline cursor-pointer"
      >
        Login
      </a>
    </p>
  </div>
</div>
